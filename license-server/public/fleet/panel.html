<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Irishka Fleet">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Irishka Fleet</title>
  <link rel="manifest" href="/fleet/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/fleet/icon-192.png">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="header__brand">
        <span class="header__logo">🍀</span>
        <div>
          <h1>Irishka Fleet</h1>
          <p class="header__sub" id="summaryLine">Loading…</p>
        </div>
      </div>
      <button type="button" class="icon-btn" id="btnRefresh" title="Refresh">↻</button>
      <button type="button" class="icon-btn" id="btnInstall" title="Install app" hidden>⬇</button>
    </header>

    <section class="summary" id="summaryCards"></section>

    <section class="auth-gate" id="authGate" hidden>
      <p class="auth-gate__lead">Paste the same <strong>Fleet secret</strong> used in Irishka Settings.</p>
      <input type="password" id="authFleetKey" class="auth-gate__input" placeholder="Fleet secret" autocomplete="off">
      <button type="button" class="btn btn--ok auth-gate__btn" id="btnAuthUnlock">Unlock panel</button>
    </section>

    <section class="toolbar">
      <button type="button" class="btn btn--ghost" data-cmd="status" data-target="all">📊 All status</button>
      <button type="button" class="btn btn--warn" data-cmd="stop" data-target="all">⏸ Pause all</button>
      <button type="button" class="btn btn--ok" data-cmd="resume" data-target="all">▶ Resume all</button>
    </section>

    <main class="list" id="instanceList">
      <div class="empty" id="emptyState">No Irishkas connected yet.</div>
    </main>

    <footer class="footer">
      <span id="lastSync">—</span>
      <p class="install-hint" id="installHint" hidden></p>
    </footer>
  </div>

  <div class="toast" id="toast" hidden></div>

  <div class="busy" id="busyOverlay" hidden>
    <div class="busy__box">
      <div class="busy__spinner"></div>
      <p id="busyText">Working…</p>
    </div>
  </div>

  <div class="modal" id="fleetModal" hidden>
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="modal__sheet" role="dialog" aria-modal="true">
      <div class="modal__head">
        <h2 id="modalTitle">Details</h2>
        <button type="button" class="icon-btn" id="modalClose" aria-label="Close">×</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <script src="panel.js?v=5"></script>
</body>
</html>
