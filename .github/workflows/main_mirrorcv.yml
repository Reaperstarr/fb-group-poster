# Despliega solo manatal-cv-mirror/ al App Service mirrorcv (monorepo fb-group-poster).
# Los secrets AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID los configura Azure al conectar GitHub (OIDC).

name: Build and deploy Node.js app to Azure Web App - mirrorcv

on:
  push:
    branches:
      - main
    paths:
      - 'manatal-cv-mirror/**'
      - '.github/workflows/main_mirrorcv.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: manatal-cv-mirror/package-lock.json

      - name: npm ci
        working-directory: manatal-cv-mirror
        run: npm ci

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: mirrorcv
          slot-name: Production
          package: manatal-cv-mirror
