# Despliega solo manatal-cv-mirror/ → Azure App Service mirrorcv.
# Secreto en GitHub: AZURE_WEBAPP_PUBLISH_PROFILE (XML completo del “perfil de publicación” de Azure).

name: Build and deploy Node.js app to Azure Web App - mirrorcv

on:
  push:
    branches:
      - main
    paths:
      - 'manatal-cv-mirror/**'
      - '.github/workflows/main_mirrorcv.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: manatal-cv-mirror/package-lock.json

      - name: npm ci
        working-directory: manatal-cv-mirror
        run: npm ci

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: mirrorcv
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: manatal-cv-mirror
